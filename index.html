<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 회원 현황 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">참마음클럽 Dashboard</h1>
                <p class="text-slate-500 font-medium">회원 현황 실시간 모니터링 시스템</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="lastUpdated" class="text-xs text-slate-400 font-medium bg-slate-100 px-3 py-1 rounded-full italic">데이터를 불러오는 중...</span>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center gap-2 font-bold active:scale-95">
                    <i class="fas fa-sync-alt"></i> 실시간 업데이트
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="card p-6 flex items-center gap-4 border-l-4 border-blue-500">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-2xl"><i class="fas fa-users fa-2x"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500">총 회원수</p>
                    <h3 id="totalCount" class="text-3xl font-bold text-slate-800">0명</h3>
                </div>
            </div>
            <div class="card p-6 flex items-center gap-4 border-l-4 border-green-500">
                <div class="p-3 bg-green-100 text-green-600 rounded-2xl"><i class="fas fa-user-shield fa-2x"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500">운영진 수</p>
                    <h3 id="staffCount" class="text-3xl font-bold text-slate-800">0명</h3>
                </div>
            </div>
            <div class="card p-6 flex items-center gap-4 border-l-4 border-purple-500">
                <div class="p-3 bg-purple-100 text-purple-600 rounded-2xl"><i class="fas fa-trophy fa-2x"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500">A/B급 비율</p>
                    <h3 id="topGradeRatio" class="text-3xl font-bold text-slate-800">0%</h3>
                </div>
            </div>
            <div class="card p-6 flex items-center gap-4 border-l-4 border-orange-500">
                <div class="p-3 bg-orange-100 text-orange-600 rounded-2xl"><i class="fas fa-calendar-alt fa-2x"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500">평균 가입 연차</p>
                    <h3 id="avgYear" class="text-3xl font-bold text-slate-800">0년</h3>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-slate-800"><i class="fas fa-chart-pie mr-2 text-blue-500"></i>급수별 분포 현황</h3>
                    <span class="text-xs text-slate-400">전체 비율 (%)</span>
                </div>
                <div class="chart-container">
                    <canvas id="gradeChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-slate-800"><i class="fas fa-chart-bar mr-2 text-indigo-500"></i>나이대별 회원 분포</h3>
                    <span class="text-xs text-slate-400">단위: 명</span>
                </div>
                <div class="chart-container">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Tables Row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Staff List -->
            <div class="lg:col-span-1">
                <div class="card overflow-hidden h-full">
                    <div class="p-5 border-b bg-slate-50 flex items-center justify-between">
                        <h3 class="font-bold text-slate-800"><i class="fas fa-id-badge mr-2 text-blue-600"></i>클럽 운영진 명단</h3>
                        <span id="staffTotal" class="bg-blue-600 text-white text-xs px-2.5 py-1 rounded-full font-bold">0</span>
                    </div>
                    <ul id="staffList" class="divide-y divide-slate-100 max-h-[500px] overflow-y-auto scrollbar-hide">
                        <!-- Staff Items -->
                    </ul>
                </div>
            </div>

            <!-- Full Member List -->
            <div class="lg:col-span-2">
                <div class="card overflow-hidden">
                    <div class="p-5 border-b bg-slate-50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <h3 class="font-bold text-slate-800"><i class="fas fa-list-ul mr-2 text-indigo-600"></i>전체 회원 관리 명단</h3>
                        <div class="relative w-full sm:w-64">
                            <input type="text" id="memberSearch" placeholder="이름으로 검색하세요..." class="w-full text-sm border-slate-200 border rounded-xl pl-10 pr-4 py-2 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none shadow-sm">
                            <i class="fas fa-search absolute left-4 top-3 text-slate-400 text-xs"></i>
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 z-10">
                                <tr>
                                    <th class="px-6 py-4 font-bold border-b">성명</th>
                                    <th class="px-6 py-4 font-bold text-center border-b">급수</th>
                                    <th class="px-6 py-4 font-bold text-center border-b">나이대</th>
                                    <th class="px-6 py-4 font-bold border-b">최초 가입일</th>
                                </tr>
                            </thead>
                            <tbody id="memberTableBody" class="text-sm divide-y divide-slate-100">
                                <!-- Members -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Google Spreadsheet ID (실제 시트의 URL에서 추출)
        const SPREADSHEET_ID = '1b1uUos7N3BfuWgHmnyv88FikfZ3g-3sKLkdeJTCrdoQ';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let gradeChart, ageChart;
        let allMembers = [];

        function processMemberData(csvData) {
            const rows = csvData.split('\n').slice(1);
            const members = [];

            rows.forEach(row => {
                if (!row.trim()) return;
                const columns = row.split(',');
                if (columns.length < 2) return;

                const name = columns[0].trim();
                const info = columns[1] ? columns[1].trim() : "미상";
                const position = columns[2] ? columns[2].trim() : "";
                const joinDate = columns[3] ? columns[3].trim() : "미상";

                // 연령대 및 급수 파싱 (예: 45D -> 40대, D급)
                const ageGroup = info.length >= 2 ? info.substring(0, 1) + '0대' : '불명';
                const grade = info.length >= 1 ? info.slice(-1).toUpperCase() : '?';

                members.push({ name, ageGroup, grade, position, joinDate });
            });
            return members;
        }

        async function fetchData() {
            try {
                // 웹에 게시(CSV) URL 시도
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('CSV 로드 실패');
                const data = await response.text();
                allMembers = processMemberData(data);
                
                renderDashboard(allMembers);
                document.getElementById('lastUpdated').innerText = `마지막 업데이트: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.warn('실시간 데이터 연동 실패 - 정적 데이터를 불러옵니다.');
                // 정적 데이터 대체
                const staticData = `이름,소개,직책,가입일
김병찬,45D,총무,2024년 4월 26일
이수중,50B,회장,2021년 6월 22일
김상훈,60A,자문위원,2022년 11월 12일
이보영,45B,부회장,2019년 4월 2일
이승환,20C,청년부장,2024년 2월 2일
임성민,45D,재무,2020년 6월 26일
조창재,45A,경기이사,2025년 1월 4일
장수진,30D,,2024년 11월 19일
권오령,30D,,2025년 6월 9일
김상기,60D,,2023년 4월 24일
김건호,20D,,2025년 3월 13일
김근호,45D,,2025년 3월 11일
김영진,60D,,2023년 3월 1일
김옥수,55D,,2025년 5월 16일
김용철,60C,,2020년 8월 11일
김을숙,50D,,2021년 8월 25일
김정일,50D,,2019년 4월 21일
김종혁,50D,,2021년 6월 22일
김해용,50D,,2022년 11월 11일
노석영,50D,,2021년 12월 2일
도병국,50D,,2024년 4월 15일
류시영,55C,,2019년 2월 13일
박남순,55C,,2026년 1월 3일
박성진,50D,,2022년 5월 18일
박재만,60D,,2016년 9월 8일
박주은,20D,,2023년 3월 30일
박학봉씨,45B,,2019년 4월 20일
백상현,50C,,2022년 7월 13일
손영수,50A,,2024년 4월 1일
손원철,60C,,2019년 4월 3일
손지현,30B,,2022년 11월 1일
유윤화,45B,,2021년 3월 30일
윤상철,50D,,2022년 7월 11일
이건호,50D,,2025년 4월 14일
이숙자,70A,,2019년 4월 20일
이재경,60C,,2016년 9월 9일
이재민,30D,,2023년 4월 29일
이청호,45C,,2025년 1월 23일
이태관,20C,,2024년 1월 11일
이혜지,45C,,2022년 3월 14일
전지현,50C,,2021년 6월 23일
정경희,50D,,2024년 2월 7일
정미경,45B,,2021년 1월 20일
정주한,40D,,2018년 1월 8일
조목화,45B,,2019년 4월 2일
조정수,55B,,2019년 4월 20일
조현곤,55B,,2019년 4월 22일
차동환,50D,,2026년 1월 23일
차신효,45D,,2024년 4월 26일
최시원,50D,,2021년 3월 2일
최유경,50A,,2021년 2월 26일
하우태,45C,,2019년 4월 22일
한미희,40B,,2020년 7월 1일
한효민,45D,,2024년 11월 13일
홍정헌,40D,,2024년 9월 26일
황석출,60A,,2019년 4월 28일
황석현,40D,,2025년 9월 24일`;
                allMembers = processMemberData(staticData);
                renderDashboard(allMembers);
                document.getElementById('lastUpdated').innerText = `최근 업데이트(백업): ${new Date().toLocaleTimeString()}`;
            }
        }

        function renderDashboard(members) {
            const total = members.length;
            const staff = members.filter(m => m.position);
            const topGradesCount = members.filter(m => ['A', 'B'].includes(m.grade)).length;
            
            // Stats UI
            document.getElementById('totalCount').innerText = `${total}명`;
            document.getElementById('staffCount').innerText = `${staff.length}명`;
            document.getElementById('topGradeRatio').innerText = `${Math.round((topGradesCount / total) * 100)}%`;
            
            // Avg Join Year (임시 계산)
            const currentYear = new Date().getFullYear();
            const years = members.map(m => {
                const match = m.joinDate.match(/\d{4}/);
                return match ? currentYear - parseInt(match[0]) : 0;
            });
            const avgY = years.reduce((a, b) => a + b, 0) / total;
            document.getElementById('avgYear').innerText = `${avgY.toFixed(1)}년`;

            updateCharts(members);
            renderStaffList(staff);
            renderMemberTable(members);
        }

        function updateCharts(members) {
            // Grade Chart
            const gradeLabels = ['A', 'B', 'C', 'D'];
            const gradeData = gradeLabels.map(g => members.filter(m => m.grade === g).length);

            if (gradeChart) gradeChart.destroy();
            gradeChart = new Chart(document.getElementById('gradeChart'), {
                type: 'doughnut',
                data: {
                    labels: gradeLabels,
                    datasets: [{
                        data: gradeData,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                        hoverOffset: 15,
                        borderRadius: 5
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // Age Chart
            const ageLabels = ['20대', '30대', '40대', '50대', '60대', '70대'];
            const ageData = ageLabels.map(a => members.filter(m => m.ageGroup === a).length);

            if (ageChart) ageChart.destroy();
            ageChart = new Chart(document.getElementById('ageChart'), {
                type: 'bar',
                data: {
                    labels: ageLabels,
                    datasets: [{
                        data: ageData,
                        backgroundColor: '#6366f1',
                        borderRadius: 10,
                        barThickness: 20
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderStaffList(staff) {
            const list = document.getElementById('staffList');
            document.getElementById('staffTotal').innerText = staff.length;
            list.innerHTML = staff.map(s => `
                <li class="p-4 flex items-center justify-between hover:bg-blue-50/50 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold shadow-md shadow-indigo-100">
                            ${s.name.charAt(0)}
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">${s.name}</p>
                            <p class="text-[11px] text-slate-400 font-medium">${s.ageGroup} · ${s.grade}급</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 bg-white border border-slate-200 text-indigo-600 text-[11px] font-bold rounded-lg shadow-sm">
                        ${s.position}
                    </span>
                </li>
            `).join('');
        }

        function renderMemberTable(members) {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = members.map(m => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${m.name}</div>
                        ${m.position ? `<span class="text-[10px] text-blue-600 font-bold bg-blue-50 px-1.5 py-0.5 rounded">${m.position}</span>` : ''}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${getGradeStyle(m.grade)}">
                            ${m.grade}급
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center text-slate-600 font-semibold">${m.ageGroup}</td>
                    <td class="px-6 py-4 text-slate-400 text-xs">${m.joinDate}</td>
                </tr>
            `).join('');
        }

        function getGradeStyle(grade) {
            switch(grade) {
                case 'A': return 'bg-blue-100 text-blue-700';
                case 'B': return 'bg-green-100 text-green-700';
                case 'C': return 'bg-yellow-100 text-yellow-700';
                case 'D': return 'bg-red-100 text-red-700';
                default: return 'bg-slate-100 text-slate-600';
            }
        }

        document.getElementById('memberSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMembers.filter(m => m.name.toLowerCase().includes(term));
            renderMemberTable(filtered);
        });

        window.onload = fetchData;
    </script>
</body>
</html>
