<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 회원현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        canvas { max-width: 100% !important; height: 100% !important; }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
        
        /* Modal Animation */
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-[#1e293b] pb-10">

    <!-- Password Modal -->
    <div id="passwordModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm modal-overlay">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center modal-content scale-90">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                <i data-lucide="lock" class="w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800 mb-2">연락처 잠금 해제</h2>
            <p class="text-xs text-slate-400 font-bold mb-6">마스터 비밀번호 4자리를 입력하세요</p>
            
            <input type="password" id="pwInput" maxlength="4" placeholder="••••" 
                   class="w-full text-center text-2xl tracking-[1em] py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all mb-4" />
            
            <div id="pwError" class="hidden text-rose-500 text-xs font-bold mb-4 italic">비밀번호가 일치하지 않습니다.</div>
            
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl transition-all">취소</button>
                <button onclick="verifyPassword()" class="flex-1 py-3 bg-blue-600 text-white font-black text-sm rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">확인</button>
            </div>
        </div>
    </div>

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i data-lucide="users" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-tight">참마음클럽 회원현황</h1>
                    <p class="text-[11px] text-slate-500 font-bold mt-0.5">개발자: <span class="text-blue-600 font-black">참마음클럽 김병찬</span></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="refreshBtn" class="p-2.5 hover:bg-slate-100 rounded-full transition-colors group" title="데이터 새로고침">
                    <i data-lucide="refresh-cw" id="refreshIcon" class="w-5 h-5 text-slate-400 group-hover:text-blue-500"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="statsContainer"></div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 card-hover">
                <h3 class="text-[11px] font-black text-slate-400 mb-5 flex items-center gap-2 uppercase tracking-widest border-b border-slate-50 pb-3">
                    <i data-lucide="pie-chart" class="w-3.5 h-3.5 text-blue-500"></i> 성별 구성
                </h3>
                <div class="h-[200px] w-full relative">
                    <canvas id="genderChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2 card-hover">
                <h3 class="text-[11px] font-black text-slate-400 mb-5 flex items-center gap-2 uppercase tracking-widest border-b border-slate-50 pb-3">
                    <i data-lucide="bar-chart-3" class="w-3.5 h-3.5 text-indigo-500"></i> 연령대별 현황
                </h3>
                <div class="h-[200px] w-full">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Rank & Management -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 card-hover">
                <h3 class="text-[11px] font-black text-slate-400 mb-5 flex items-center gap-2 uppercase tracking-widest border-b border-slate-50 pb-3">
                    <i data-lucide="award" class="w-3.5 h-3.5 text-amber-500"></i> 급수별 현황
                </h3>
                <div class="h-[320px] w-full">
                    <canvas id="rankChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 card-hover h-full">
                <h3 class="text-[11px] font-black text-slate-400 mb-5 flex items-center gap-2 uppercase tracking-widest border-b border-slate-50 pb-3">
                    <i data-lucide="user-check" class="w-4 h-4 text-blue-600"></i> 클럽 운영진 현황 <span id="mgrCountText" class="text-blue-600 font-black"></span>
                </h3>
                <div id="managerList" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 pr-1"></div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <h3 class="font-black text-slate-800 text-sm">전체 회원 명단 <span id="memberTotalText" class="ml-1 text-blue-600 text-xs font-bold"></span></h3>
                    <button id="unlockBtn" onclick="openModal()" class="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-500 hover:text-blue-600 hover:border-blue-200 shadow-sm transition-all">
                        <i data-lucide="lock" class="w-3 h-3"></i> 연락처 잠금 해제
                    </button>
                </div>
                <div class="relative w-full sm:w-64">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i>
                    <input type="text" id="tableSearch" placeholder="이름 또는 급수 검색" class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-100 shadow-sm transition-all" />
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[13px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 font-black uppercase tracking-tighter border-b border-slate-100">
                            <th class="px-6 py-4">성함</th>
                            <th class="px-4 py-4">성별</th>
                            <th class="px-4 py-4 text-center">연령</th>
                            <th class="px-4 py-4">급수</th>
                            <th class="px-4 py-4">직책</th>
                            <th class="px-6 py-4 text-blue-600">연락처</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = '1b1uUos7N3BfuWgHmnyv88FikfZ3g-3sKLkdeJTCrdoQ';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
        const MGR_ORDER = { '회장': 1, '부회장': 2, '총무': 3, '재무': 4, '경기이사': 5, '청년부장': 6, '자문위원': 7 };
        
        // --- 마스터 비밀번호 설정 ---
        const MASTER_PASSWORD = "1004"; 
        // ---------------------------

        let rawMembers = [];
        let activeCharts = {};
        let isAuthorized = false;

        const chartValuePlugin = {
            id: 'chartValuePlugin',
            afterDatasetsDraw(chart) {
                const { ctx, data } = chart;
                ctx.save();
                ctx.font = 'bold 11px Pretendard';
                ctx.textBaseline = 'middle';
                data.datasets.forEach((dataset, i) => {
                    chart.getDatasetMeta(i).data.forEach((bar, index) => {
                        const value = dataset.data[index] + '명';
                        if (chart.config.options.indexAxis === 'y') {
                            ctx.textAlign = 'left';
                            ctx.fillStyle = dataset.backgroundColor;
                            ctx.fillText(value, bar.x + 8, bar.y);
                        } else {
                            ctx.textAlign = 'center';
                            ctx.fillStyle = dataset.backgroundColor;
                            ctx.fillText(value, bar.x, bar.y - 12);
                        }
                    });
                });
                ctx.restore();
            }
        };

        const openModal = () => {
            const modal = document.getElementById('passwordModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.querySelector('.modal-content').classList.remove('scale-90');
                document.getElementById('pwInput').focus();
            }, 10);
        };

        const closeModal = () => {
            const modal = document.getElementById('passwordModal');
            modal.querySelector('.modal-content').classList.add('scale-90');
            modal.classList.remove('opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('pwInput').value = '';
                document.getElementById('pwError').classList.add('hidden');
            }, 300);
        };

        const verifyPassword = () => {
            const input = document.getElementById('pwInput').value;
            if (input === MASTER_PASSWORD) {
                isAuthorized = true;
                const unlockBtn = document.getElementById('unlockBtn');
                unlockBtn.innerHTML = '<i data-lucide="unlock" class="w-3. h-3 text-blue-600"></i> 연락처 잠금 해제됨';
                unlockBtn.classList.add('bg-blue-50', 'border-blue-200', 'text-blue-600');
                unlockBtn.disabled = true;
                lucide.createIcons();
                renderTable();
                closeModal();
            } else {
                document.getElementById('pwError').classList.remove('hidden');
                document.getElementById('pwInput').value = '';
                document.getElementById('pwInput').focus();
            }
        };

        const maskPhone = (phone) => {
            if (!phone) return '-';
            if (isAuthorized) return phone;
            return phone.replace(/(\d{3})-(\d{4})-(\d{4})/, '$1-****-****').replace(/(\d{3})(\d{4})(\d{4})/, '$1-****-****');
        };

        const init = () => {
            lucide.createIcons();
            fetchData();
            document.getElementById('pwInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyPassword();
            });
        };

        const fetchData = async () => {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin');
            try {
                const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const csv = await res.text();
                processData(csv);
            } catch (err) {
                console.error(err);
            } finally {
                icon.classList.remove('animate-spin');
            }
        };

        const processData = (csv) => {
            const lines = csv.replace(/^\uFEFF/, '').split(/\r?\n/);
            if (lines.length < 2) return;
            const headers = splitCSV(lines[0]);
            rawMembers = [];
            for (let i = 1; i < lines.length; i++) {
                const values = splitCSV(lines[i]);
                if (values.length < 2) continue;
                const member = { _raw: values };
                headers.forEach((h, idx) => { member[h.trim()] = values[idx]?.trim() || ''; });
                rawMembers.push(member);
            }
            renderAll();
        };

        const splitCSV = (str) => {
            const res = [];
            let cur = '', q = false;
            for (let c of str) {
                if (c === '"') q = !q;
                else if (c === ',' && !q) { res.push(cur); cur = ''; }
                else cur += c;
            }
            res.push(cur);
            return res;
        };

        const getField = (m, keys, colIdx = -1) => {
            for (let k of keys) { if (m[k]) return m[k]; }
            if (colIdx !== -1 && m._raw[colIdx]) return m._raw[colIdx];
            return '';
        };

        const renderAll = () => {
            const stats = { 남: 0, 여: 0, ageMap: {}, rankMap: {}, managers: [] };
            rawMembers.forEach(m => {
                const g = getField(m, ['성별', '성'], 1);
                if (g.includes('남')) stats.남++; else if (g.includes('여')) stats.여++;
                const aRaw = getField(m, ['나이', '연령', 'Age'], 2);
                const aNum = aRaw.toString().match(/\d+/);
                if (aNum) {
                    const age = parseInt(aNum[0]);
                    const group = Math.floor(age / 5) * 5 + '대';
                    stats.ageMap[group] = (stats.ageMap[group] || 0) + 1;
                }
                const r = getField(m, ['급수', '부수']);
                if (r && r !== '-') stats.rankMap[r] = (stats.rankMap[r] || 0) + 1;
                const p = getField(m, ['직책', '구분']);
                if (p && p !== '-' && p !== '회원' && p !== '일반') {
                    stats.managers.push({ name: getField(m, ['이름', '성함'], 0), pos: p });
                }
            });

            document.getElementById('statsContainer').innerHTML = `
                ${statCard('전체 회원', rawMembers.length, '명', 'blue', 'users')}
                ${statCard('클럽 운영진', stats.managers.length, '명', 'indigo', 'shield-check')}
                ${statCard('남성 회원', stats.남, '명', 'blue', 'circle-user')}
                ${statCard('여성 회원', stats.여, '명', 'rose', 'circle-user')}
            `;

            stats.managers.sort((a, b) => (MGR_ORDER[a.pos] || 99) - (MGR_ORDER[b.pos] || 99));
            document.getElementById('mgrCountText').innerText = `(${stats.managers.length}명)`;
            document.getElementById('managerList').innerHTML = stats.managers.map(m => `
                <div class="flex flex-col items-center p-3 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white hover:border-blue-200 transition-all shadow-sm group">
                    <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center mb-2 text-blue-600 font-black border border-slate-100 group-hover:bg-blue-600 group-hover:text-white transition-all text-[10px] shadow-inner px-1 text-center leading-tight">
                        ${m.pos}
                    </div>
                    <p class="font-bold text-slate-800 text-[13px]">${m.name}</p>
                </div>
            `).join('');

            renderCharts(stats);
            renderTable();
            lucide.createIcons();
        };

        const statCard = (t, v, u, c, icon) => `
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm card-hover">
                <div class="flex justify-between items-start mb-2">
                    <div class="p-2 rounded-lg bg-${c}-50 text-${c}-600 shadow-sm"><i data-lucide="${icon}" class="w-4 h-4"></i></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${t}</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black text-slate-800 tracking-tight">${v}</span><span class="text-[11px] font-bold text-slate-400">${u}</span>
                </div>
            </div>
        `;

        const renderCharts = (s) => {
            const ctxG = document.getElementById('genderChart').getContext('2d');
            if (activeCharts.g) activeCharts.g.destroy();
            activeCharts.g = new Chart(ctxG, {
                type: 'doughnut',
                data: {
                    labels: [`남 (${s.남}명)`, `여 (${s.여}명)`],
                    datasets: [{ data: [s.남, s.여], backgroundColor: ['#3b82f6', '#f43f5e'], borderWidth: 0 }]
                },
                options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 15, font: { size: 12, weight: 'bold' } } } } }
            });

            const ageKeys = Object.keys(s.ageMap).sort((a, b) => parseInt(a) - parseInt(b));
            const ctxA = document.getElementById('ageChart').getContext('2d');
            if (activeCharts.a) activeCharts.a.destroy();
            activeCharts.a = new Chart(ctxA, {
                type: 'bar',
                plugins: [chartValuePlugin],
                data: { labels: ageKeys, datasets: [{ label: '인원', data: ageKeys.map(k => s.ageMap[k]), backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, layout: { padding: { top: 25 } }, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 12 } } } } }
            });

            const rankKeys = Object.keys(s.rankMap).sort();
            const ctxR = document.getElementById('rankChart').getContext('2d');
            if (activeCharts.r) activeCharts.r.destroy();
            activeCharts.r = new Chart(ctxR, {
                type: 'bar',
                plugins: [chartValuePlugin],
                data: { labels: rankKeys, datasets: [{ label: '인원', data: rankKeys.map(k => s.rankMap[k]), backgroundColor: '#f59e0b', borderRadius: 8 }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, layout: { padding: { right: 40 } }, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, display: false }, y: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 13 } } } } }
            });
        };

        const renderTable = () => {
            const q = document.getElementById('tableSearch').value.toLowerCase();
            const filtered = rawMembers.filter(m => {
                const name = getField(m, ['이름', '성함'], 0).toLowerCase();
                const rank = getField(m, ['급수']).toLowerCase();
                const phone = getField(m, ['연락처', '전화번호', 'Phone'], 5).toLowerCase();
                return name.includes(q) || rank.includes(q) || (isAuthorized && phone.includes(q));
            });
            document.getElementById('memberTotalText').innerText = `${filtered.length}명`;
            document.getElementById('tableBody').innerHTML = filtered.map(m => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-3 font-bold text-slate-700">${getField(m, ['이름', '성함'], 0)}</td>
                    <td class="px-4 py-3">
                        <span class="text-[10px] font-black px-2 py-0.5 rounded-lg ${getField(m, ['성별'], 1).includes('남') ? 'bg-blue-50 text-blue-600' : 'bg-rose-50 text-rose-600'}">
                            ${getField(m, ['성별'], 1)}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-center text-slate-500 font-medium">${getField(m, ['나이', '연령'], 2)}</td>
                    <td class="px-4 py-3">
                        <span class="bg-amber-50 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded border border-amber-100">${getField(m, ['급수']) || '-'}</span>
                    </td>
                    <td class="px-4 py-3 text-blue-600 font-bold text-[11px]">${getField(m, ['직책']) === '-' ? '' : getField(m, ['직책'])}</td>
                    <td class="px-6 py-3 font-medium ${isAuthorized ? 'text-slate-800' : 'text-slate-300 italic'}">${maskPhone(getField(m, ['연락처', '전화번호', 'Phone'], 5))}</td>
                </tr>
            `).join('');
        };

        document.getElementById('refreshBtn').onclick = fetchData;
        document.getElementById('tableSearch').oninput = renderTable;
        window.onload = init;
    </script>
</body>
</html>
