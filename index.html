<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 회원 현황 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .grade-tag { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }
        .grade-A { background-color: #fef3c7; color: #92400e; }
        .grade-B { background-color: #dcfce7; color: #166534; }
        .grade-C { background-color: #dbeafe; color: #1e40af; }
        .grade-D { background-color: #f1f5f9; color: #475569; }
        
        /* Loading Animation */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">참마음클럽 대시보드</h1>
                <p class="text-slate-500" id="last-updated">데이터를 불러오는 중...</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="refresh-btn" onclick="fetchData(true)" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all active:scale-95 disabled:opacity-50">
                    <i id="refresh-icon" data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span id="refresh-text">새로고침</span>
                </button>
            </div>
        </header>

        <!-- Main Stats -->
        <div id="stats-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-6 flex items-center gap-4 border-l-4 border-blue-500">
                <div class="bg-blue-100 p-3 rounded-full text-blue-600">
                    <i data-lucide="users" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">총 회원수</p>
                    <h2 id="total-members" class="text-3xl font-bold text-slate-800">0</h2>
                </div>
            </div>
            <div class="card p-6 flex items-center gap-4 border-l-4 border-emerald-500">
                <div class="bg-emerald-100 p-3 rounded-full text-emerald-600">
                    <i data-lucide="award" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">최고 급수 (A)</p>
                    <h2 id="grade-a-count" class="text-3xl font-bold text-slate-800">0</h2>
                </div>
            </div>
            <div class="card p-6 flex items-center gap-4 border-l-4 border-orange-500">
                <div class="bg-orange-100 p-3 rounded-full text-orange-600">
                    <i data-lucide="calendar" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">주요 연령대</p>
                    <h2 id="top-age-group" class="text-3xl font-bold text-slate-800">-</h2>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-blue-500"></i>
                    급수별 현황
                </h3>
                <div class="h-64">
                    <canvas id="gradeChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-5 h-5 text-emerald-500"></i>
                    연령대별 현황
                </h3>
                <div class="h-64">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Positions Section -->
        <div class="card p-6 mb-8">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2">
                <i data-lucide="shield-check" class="w-5 h-5 text-purple-500"></i>
                직책별 명단
            </h3>
            <div id="position-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Dynamic Content -->
            </div>
        </div>

        <!-- Member Table -->
        <div class="card overflow-hidden">
            <div class="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-slate-500"></i>
                    회원 총명단
                </h3>
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="member-search" placeholder="이름 또는 직책 검색..." class="pl-10 pr-4 py-2 w-full border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="px-6 py-4 font-semibold text-slate-600">이름</th>
                            <th class="px-6 py-4 font-semibold text-slate-600">연령대</th>
                            <th class="px-6 py-4 font-semibold text-slate-600">급수</th>
                            <th class="px-6 py-4 font-semibold text-slate-600">직책</th>
                            <th class="px-6 py-4 font-semibold text-slate-600">가입일</th>
                        </tr>
                    </thead>
                    <tbody id="member-table-body" class="divide-y">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Lucide Icons initialization
        lucide.createIcons();

        const SPREADSHEET_ID = '1b1uUos7N3BfuWgHmnyv88FikfZ3g-3sKLkdeJTCrdoQ';
        // 더 안정적인 Google Visualization API 엔드포인트 사용
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;
        const CACHE_KEY = 'cham_maum_cache';

        let gradeChartInstance = null;
        let ageChartInstance = null;
        let allMembers = [];

        // Loading state control
        function toggleLoading(isLoading) {
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            const text = document.getElementById('refresh-text');
            const stats = document.getElementById('stats-container');

            if (isLoading) {
                btn.disabled = true;
                if(icon) icon.classList.add('spin');
                if(text) text.innerText = '동기화 중...';
                if(stats) stats.classList.add('loading-pulse');
            } else {
                btn.disabled = false;
                if(icon) icon.classList.remove('spin');
                if(text) text.innerText = '새로고침';
                if(stats) stats.classList.remove('loading-pulse');
            }
        }

        // CSV parsing that handles quotes and commas correctly
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const result = [];
                let cur = '', inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) {
                        result.push(cur);
                        cur = '';
                    } else cur += char;
                }
                result.push(cur);
                // Remove surrounding quotes and trim
                return result.map(v => v.replace(/^"|"$/g, '').trim());
            });
        }

        async function fetchData(isManual = false) {
            // 1. Try to load from Cache first
            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData && !isManual) {
                try {
                    const parsedCache = JSON.parse(cachedData);
                    allMembers = parsedCache.data;
                    updateDashboard();
                    document.getElementById('last-updated').innerText = `최근 데이터 (확인: ${parsedCache.time})`;
                } catch (e) { console.error("Cache parse error", e); }
            }

            toggleLoading(true);

            try {
                // 2. Fetch fresh data
                const response = await fetch(CSV_URL + '&cache_bust=' + Date.now());
                if (!response.ok) throw new Error('Network response was not ok');
                
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                // Header: [이름, 소개, 직책, 가입일]
                const data = rows.slice(1).filter(row => row[0] && row[0] !== "");
                
                const newMembers = data.map(row => {
                    const info = row[1] ? row[1] : "";
                    const age = info.replace(/[A-Z]/gi, '');
                    const grade = info.slice(-1).toUpperCase();
                    return {
                        name: row[0],
                        code: info,
                        ageGroup: age ? Math.floor(parseInt(age) / 10) * 10 + '대' : '미상',
                        grade: (['A','B','C','D'].includes(grade) ? grade : 'D') + '급',
                        position: row[2] || '',
                        joinDate: row[3] || ''
                    };
                });

                if (newMembers.length > 0) {
                    allMembers = newMembers;
                    const timestamp = new Date().toLocaleString();
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        data: allMembers,
                        time: timestamp
                    }));
                    
                    updateDashboard();
                    document.getElementById('last-updated').innerText = `최종 업데이트: ${timestamp}`;
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('last-updated').innerText = "데이터 로딩 실패 (공개 설정을 확인하세요)";
                // 만약 에러가 나면 사용자에게 가이드를 줌
                if (!allMembers.length) {
                    const tbody = document.getElementById('member-table-body');
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400 font-medium">
                        데이터를 불러올 수 없습니다.<br>
                        스프레드시트에서 [파일] -> [공유] -> [웹에 게시]를 눌렀는지 확인해주세요.
                    </td></tr>`;
                }
            } finally {
                toggleLoading(false);
                lucide.createIcons();
            }
        }

        function updateDashboard() {
            // Summary Stats
            document.getElementById('total-members').innerText = allMembers.length;
            const aGradeCount = allMembers.filter(m => m.grade === 'A급').length;
            document.getElementById('grade-a-count').innerText = aGradeCount;

            // Grade Stats
            const grades = ['A급', 'B급', 'C급', 'D급'];
            const gradeCounts = grades.map(g => allMembers.filter(m => m.grade === g).length);
            updateGradeChart(grades, gradeCounts);

            // Age Stats
            const ageGroups = ['20대', '30대', '40대', '50대', '60대', '70대'];
            const ageCounts = ageGroups.map(a => allMembers.filter(m => m.ageGroup === a).length);
            updateAgeChart(ageGroups, ageCounts);

            const maxAgeIdx = ageCounts.indexOf(Math.max(...ageCounts));
            document.getElementById('top-age-group').innerText = ageCounts[maxAgeIdx] > 0 ? ageGroups[maxAgeIdx] : '-';

            // Position List
            updatePositionList();

            // Member Table
            renderTable(allMembers);
        }

        function updateGradeChart(labels, data) {
            const ctx = document.getElementById('gradeChart').getContext('2d');
            if (gradeChartInstance) gradeChartInstance.destroy();
            gradeChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '인원수',
                        data: data,
                        backgroundColor: ['#fbbf24', '#34d399', '#60a5fa', '#94a3b8'],
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    animation: { duration: 500 },
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function updateAgeChart(labels, data) {
            const ctx = document.getElementById('ageChart').getContext('2d');
            if (ageChartInstance) ageChartInstance.destroy();
            ageChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#f87171', '#fb923c', '#fbbf24', '#4ade80', '#60a5fa', '#a78bfa']
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    animation: { duration: 500 },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function updatePositionList() {
            const container = document.getElementById('position-list');
            container.innerHTML = '';
            
            const positions = {};
            allMembers.forEach(m => {
                if (m.position && m.position !== '-' && m.position !== '회원') {
                    if (!positions[m.position]) positions[m.position] = [];
                    positions[m.position].push(m.name);
                }
            });

            if (Object.keys(positions).length === 0) {
                container.innerHTML = '<p class="col-span-full text-slate-400 text-center py-4">등록된 직책자가 없습니다.</p>';
                return;
            }

            for (const [pos, names] of Object.entries(positions)) {
                const div = document.createElement('div');
                div.className = 'bg-slate-50 p-4 rounded-xl border border-slate-100';
                div.innerHTML = `
                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">${pos}</p>
                    <p class="text-slate-800 font-bold">${names.join(', ')}</p>
                `;
                container.appendChild(div);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400">데이터가 없습니다.</td></tr>';
                return;
            }

            data.forEach(m => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                const gradeCode = m.grade.charAt(0);
                const gradeClass = ['A','B','C','D'].includes(gradeCode) ? `grade-${gradeCode}` : 'grade-D';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-800">${m.name}</td>
                    <td class="px-6 py-4 text-slate-600">${m.ageGroup}</td>
                    <td class="px-6 py-4"><span class="grade-tag ${gradeClass}">${m.grade}</span></td>
                    <td class="px-6 py-4 text-slate-600">${m.position || '-'}</td>
                    <td class="px-6 py-4 text-slate-500 text-sm">${m.joinDate}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('member-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMembers.filter(m => 
                m.name.toLowerCase().includes(term) || 
                m.position.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        window.onload = () => fetchData();
    </script>
</body>
</html>
