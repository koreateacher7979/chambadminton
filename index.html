<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 회원현황</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        canvas { max-width: 100%; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] pb-10">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                    <i data-lucide="users" class="w-4 h-4 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight text-slate-800 leading-tight">참마음클럽 회원현황</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                        Dev: <span class="text-blue-600 font-black">참마음클럽 김병찬</span>
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button id="refreshBtn" class="p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="refresh-cw" id="refreshIcon" class="w-4 h-4 text-slate-400"></i>
                </button>
                <a id="sheetLink" target="_blank" rel="noreferrer"
                   class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-sm">
                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i> 시트 열기
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Summary Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3" id="statsGrid">
            <!-- Stats will be injected here -->
        </div>

        <!-- Charts Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                <h3 class="text-[10px] font-black text-slate-400 mb-4 flex items-center gap-2 w-full uppercase tracking-widest">
                    <i data-lucide="filter" class="w-3.5 h-3.5"></i> 성별 구성
                </h3>
                <div class="w-full h-[220px] flex items-center justify-center">
                    <canvas id="genderChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                <h3 class="text-[10px] font-black text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-widest">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 연령대별 현황 (C열 데이터)
                </h3>
                <div class="w-full h-[220px]">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Rank Stats -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-[10px] font-black text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-widest">
                    <i data-lucide="award" class="w-3.5 h-3.5"></i> 급수별 인원현황
                </h3>
                <div class="w-full h-[300px]">
                    <canvas id="rankChart"></canvas>
                </div>
            </div>

            <!-- Managers Grid -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-[10px] font-black text-slate-400 mb-6 flex items-center gap-2 uppercase tracking-widest">
                    <i data-lucide="user-check" class="w-4 h-4"></i> 클럽 운영진 현황 <span id="managerCount" class="ml-1"></span>
                </h3>
                <div id="managerGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3 overflow-y-auto max-h-[300px] pr-2 custom-scrollbar">
                    <!-- Managers will be injected here -->
                </div>
            </div>
        </div>

        <!-- Detailed Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/30">
                <div class="flex items-center gap-2">
                    <h3 class="font-black text-slate-800 text-sm tracking-tight">전체 회원 명단</h3>
                    <span id="activeCount" class="bg-white px-2 py-0.5 rounded-full text-[9px] font-black text-slate-400 border border-slate-200 shadow-sm">
                    </span>
                </div>
                <div class="relative w-full sm:w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-300"></i>
                    <input type="text" id="searchInput" placeholder="이름, 급수 검색..."
                           class="w-full pl-9 pr-3 py-1.5 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-100 transition-all shadow-sm" />
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100 bg-slate-50/50">
                            <th class="px-5 py-3">성함</th>
                            <th class="px-5 py-3">성별</th>
                            <th class="px-5 py-3 text-center">연령</th>
                            <th className="px-5 py-3">급수</th>
                            <th className="px-5 py-3">직책</th>
                            <th className="px-5 py-3">비고</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody" class="divide-y divide-slate-50">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = '1b1uUos7N3BfuWgHmnyv88FikfZ3g-3sKLkdeJTCrdoQ';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
        const POSITION_ORDER = { '회장': 1, '부회장': 2, '총무': 3, '재무': 4, '경기이사': 5, '청년부장': 6, '자문위원': 7 };

        let rawData = [];
        let filteredData = [];
        let charts = {};

        // Lucide Icons initialization
        const initIcons = () => lucide.createIcons();

        // CSV Parser (Simple)
        const parseCSV = (text) => {
            const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/);
            if (lines.length === 0) return [];
            const headers = splitCSVLine(lines[0]).map(h => h.trim());
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = splitCSVLine(lines[i]);
                const obj = { _raw: values.map(v => v.trim()) };
                headers.forEach((header, index) => {
                    obj[header] = values[index]?.trim() || '';
                });
                result.push(obj);
            }
            return result;
        };

        const splitCSVLine = (line) => {
            const result = [];
            let cur = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(cur); cur = ''; }
                else cur += char;
            }
            result.push(cur);
            return result;
        };

        const getVal = (item, keys, index = -1) => {
            for (let key of keys) { if (item[key] !== undefined && item[key] !== '') return item[key]; }
            if (index !== -1 && item._raw && item._raw[index]) return item._raw[index];
            return '';
        };

        // UI Helpers
        const renderStatCard = (title, value, unit, colorClass, iconHtml) => {
            const bgClass = { blue: 'bg-blue-50 text-blue-600', indigo: 'bg-indigo-50 text-indigo-600', rose: 'bg-rose-50 text-rose-600' }[colorClass] || 'bg-slate-50';
            return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <div class="p-1.5 rounded-xl ${bgClass}">${iconHtml}</div>
                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${title}</p>
                    </div>
                    <div class="flex items-baseline gap-1">
                        <h4 class="text-xl font-black text-slate-800 tracking-tight">${value}</h4>
                        <span class="text-[10px] font-bold text-slate-400">${unit}</span>
                    </div>
                </div>
            `;
        };

        // Core logic
        const updateUI = () => {
            const genderMap = {};
            const ageMap = {};
            const rankMap = {};
            const managers = [];

            rawData.forEach(item => {
                const gender = getVal(item, ['성별', '성'], 1).trim();
                if (gender) genderMap[gender] = (genderMap[gender] || 0) + 1;

                const ageRaw = getVal(item, ['나이', '연령'], 2);
                const ageMatch = ageRaw.toString().match(/\d+/);
                if (ageMatch) {
                    const group = Math.floor(parseInt(ageMatch[0]) / 10) * 10 + '대';
                    ageMap[group] = (ageMap[group] || 0) + 1;
                }

                const rank = getVal(item, ['급수', '부수']).trim();
                if (rank && rank !== '-') rankMap[rank] = (rankMap[rank] || 0) + 1;

                const position = getVal(item, ['직책']).trim();
                if (position && position !== '-' && position !== '회원' && position !== '일반') {
                    managers.push({ name: getVal(item, ['이름', '성함'], 0), position });
                }
            });

            // Managers Sort
            managers.sort((a, b) => (POSITION_ORDER[a.position] || 99) - (POSITION_ORDER[b.position] || 99));

            // Stats Injection
            document.getElementById('statsGrid').innerHTML = 
                renderStatCard('전체 회원', rawData.length, '명', 'blue', '<i data-lucide="users" style="width:16px; height:16px;"></i>') +
                renderStatCard('운영진', managers.length, '명', 'indigo', '<i data-lucide="shield-check" style="width:16px; height:16px;"></i>') +
                renderStatCard('남성 회원', genderMap['남'] || 0, '명', 'blue', '<div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>') +
                renderStatCard('여성 회원', genderMap['여'] || 0, '명', 'rose', '<div class="w-1.5 h-1.5 rounded-full bg-rose-500"></div>');

            // Managers List Injection
            document.getElementById('managerCount').innerText = `(${managers.length}명)`;
            document.getElementById('managerGrid').innerHTML = managers.map(m => `
                <div class="flex flex-col items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white hover:border-blue-200 transition-all shadow-sm hover:shadow-md group">
                    <div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center mb-3 text-blue-600 font-black border border-slate-100 group-hover:bg-blue-600 group-hover:text-white transition-all text-[11px] leading-tight text-center px-1 shadow-inner">
                        ${m.position}
                    </div>
                    <p class="font-bold text-slate-800 text-sm">${m.name}</p>
                </div>
            `).join('');

            // Chart Updates
            updateCharts(genderMap, ageMap, rankMap);
            renderTable();
            initIcons();
        };

        const updateCharts = (genderMap, ageMap, rankMap) => {
            // Gender Chart
            if (charts.gender) charts.gender.destroy();
            charts.gender = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(genderMap).map(k => `${k} (${genderMap[k]}명)`),
                    datasets: [{
                        data: Object.values(genderMap),
                        backgroundColor: ['#3b82f6', '#f43f5e', '#10b981'],
                        borderWidth: 4, borderColor: '#fff'
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11, weight: 'bold' } } } }
                }
            });

            // Age Chart
            const ageSortedKeys = Object.keys(ageMap).sort((a,b) => parseInt(a) - parseInt(b));
            if (charts.age) charts.age.destroy();
            charts.age = new Chart(document.getElementById('ageChart'), {
                type: 'bar',
                data: {
                    labels: ageSortedKeys,
                    datasets: [{
                        label: '인원수(명)',
                        data: ageSortedKeys.map(k => ageMap[k]),
                        backgroundColor: '#6366f1', borderRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } }
                    }
                }
            });

            // Rank Chart
            const rankSortedKeys = Object.keys(rankMap).sort();
            if (charts.rank) charts.rank.destroy();
            charts.rank = new Chart(document.getElementById('rankChart'), {
                type: 'bar',
                data: {
                    labels: rankSortedKeys,
                    datasets: [{
                        label: '인원수(명)',
                        data: rankSortedKeys.map(k => rankMap[k]),
                        backgroundColor: '#f59e0b', borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { grid: { display: false }, ticks: { font: { size: 11, weight: 'bold' } } }
                    }
                }
            });
        };

        const renderTable = () => {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawData.filter(m => {
                const name = getVal(m, ['이름', '성함'], 0).toLowerCase();
                const rank = getVal(m, ['급수']).toLowerCase();
                const pos = getVal(m, ['직책']).toLowerCase();
                return name.includes(searchTerm) || rank.includes(searchTerm) || pos.includes(searchTerm);
            });

            document.getElementById('activeCount').innerText = `${filtered.length} ACTIVE`;
            document.getElementById('memberTableBody').innerHTML = filtered.map(m => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-5 py-2.5 font-bold text-slate-700 text-xs">${getVal(m, ['이름', '성함'], 0)}</td>
                    <td class="px-5 py-2.5">
                        <span class="text-[9px] font-black px-1.5 py-0.5 rounded-md ${getVal(m, ['성별'], 1) === '남' ? 'bg-blue-50 text-blue-600' : 'bg-rose-50 text-rose-600'}">
                            ${getVal(m, ['성별'], 1)}
                        </span>
                    </td>
                    <td class="px-5 py-2.5 text-xs text-slate-500 text-center font-medium">${getVal(m, ['나이', '연령'], 2)}</td>
                    <td class="px-5 py-2.5">
                        <span class="bg-amber-50 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded-md border border-amber-100">
                            ${getVal(m, ['급수']) || '-'}
                        </span>
                    </td>
                    <td class="px-5 py-2.5 text-blue-600 font-bold text-[11px]">${getVal(m, ['직책']) === '-' ? '' : getVal(m, ['직책'])}</td>
                    <td class="px-5 py-2.5 text-[10px] text-slate-400 italic truncate max-w-[120px]">${getVal(m, ['비고'])}</td>
                </tr>
            `).join('');
        };

        const fetchData = async () => {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const text = await response.text();
                rawData = parseCSV(text);
                updateUI();
            } catch (err) {
                console.error(err);
                alert('데이터를 불러오는데 실패했습니다.');
            } finally {
                refreshIcon.classList.remove('animate-spin');
            }
        };

        // Event Listeners
        document.getElementById('refreshBtn').addEventListener('click', fetchData);
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('sheetLink').href = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}`;

        // Initial Load
        window.onload = fetchData;
    </script>
</body>
</html>
